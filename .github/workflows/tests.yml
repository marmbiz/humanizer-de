name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run test suite
        run: python3 -m unittest discover -s tests -v
      - name: Linter smoke tests
        run: |
          python3 scripts/unicode_lint.py --text "AB" > /dev/null
          python3 scripts/rhythm_lint.py --text "Kurzer Test. Noch ein Satz." > /dev/null
