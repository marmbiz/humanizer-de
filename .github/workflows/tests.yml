name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run verify gate
        run: make verify

  precise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-precise.txt
      - name: Install pinned precision dependencies
        run: python -m pip install --requirement requirements-precise.txt
      - name: Require German model
        run: python -c "import spacy; spacy.load('de_core_news_sm')"
      - name: Run verify gate with precision path active
        run: make verify

  windows-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run portable unit suite
        run: python -m unittest discover -s tests -v
